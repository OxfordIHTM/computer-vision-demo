name: deploy extraction workflow

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy-extraction-workflow:
    runs-on: self-hosted
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GIT_CRYPT_KEY64: ${{ secrets.GIT_CRYPT_KEY64 }}
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Trust git repo
        run: |
          git config --global --add safe.directory /__w/computer-vision-demo/computer-vision-demo

      - name: Decrypt repository using symmetric key
        run: |
          echo $GIT_CRYPT_KEY64 > git_crypt_key.key64 && base64 -di git_crypt_key.key64 > git_crypt_key.key && git-crypt unlock git_crypt_key.key
          rm git_crypt_key.key git_crypt_key.key64

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install packages from renv.lock (local, no cache)
        run: |
          renv::restore()
        shell: Rscript {0}
        
      - name: Run workflow
        run: |
          targets::tar_make(
            c(
              gemma_extraction_results_long_csv,
              gemma_extraction_results_wide_csv,
              qwen_extraction_results_long_csv,
              qwen_extraction_results_wide_csv,
              deepseek_extraction_results_long_csv,
              deepseek_extraction_results_wide_csv,
              llava_extraction_results_long_csv,
              llava_extraction_results_wide_csv
            )
          )
        shell: Rscript {0}

      - name: Archive test extraction results
        uses: actions/upload-artifact@v7
        with:
          name: extraction-results
          path: data/*_extraction_results_*.csv

      - name: Render report/s
        run: |
          targets::tar_make(text_extraction_handwriting_report)
        shell: Rscript {0}

      - name: Copy reports to docs directory
        run: |
          mkdir docs
          cp reports/preliminary_report.html docs
          cp slides/update_slides_20260611.html docs

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
