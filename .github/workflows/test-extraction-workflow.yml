name: test extraction workflow

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-extraction-workflow:
    runs-on: self-hosted
    env:
      GIT_CRYPT_KEY64: ${{ secrets.GIT_CRYPT_KEY64 }}
    steps:
      - uses: actions/checkout@v6

      - name: Trust git repo
        run: |
          git config --global --add safe.directory /__w/computer-vision-demo/computer-vision-demo

      - name: Decrypt repository using symmetric key
        run: |
          echo $GIT_CRYPT_KEY64 > git_crypt_key.key64 && base64 -di git_crypt_key.key64 > git_crypt_key.key && git-crypt unlock git_crypt_key.key
          rm git_crypt_key.key git_crypt_key.key64
          
      - name: Install packages from renv.lock (with cache)
        if: ${{ !env.ACT }}  
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Install packages from renv.lock (local, no cache)
        if: ${{ env.ACT }}
        run: |
          renv::restore()
        shell: Rscript {0}
        
      - name: Run workflow
        run: |
          targets::tar_make(
            c(
              gemma_test_extraction_results_long_csv,
              gemma_test_extraction_results_wide_csv,
              qwen_test_extraction_results_long_csv,
              qwen_test_extraction_results_wide_csv,
              deepseek_test_extraction_results_long_csv,
              deepseek_test_extraction_results_wide_csv,
              llava_test_extraction_results_long_csv,
              llava_test_extraction_results_wide_csv
            )
          )
        shell: Rscript {0}

      - name: Archive test extraction results
        uses: actions/upload-artifact@v7
        with:
          name: test-extraction-results
          path: tests/*_test_extraction_results_*.csv
