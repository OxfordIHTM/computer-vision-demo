name: deploy extraction workflow

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy-extraction-workflow:
    runs-on: self-hosted
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GIT_CRYPT_KEY64: ${{ secrets.GIT_CRYPT_KEY64 }}
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Trust git repo
        run: |
          git config --global --add safe.directory /__w/computer-vision-demo/computer-vision-demo

      - name: Decrypt repository using symmetric key
        run: |
          echo $GIT_CRYPT_KEY64 > git_crypt_key.key64 && base64 -di git_crypt_key.key64 > git_crypt_key.key && git-crypt unlock git_crypt_key.key
          rm git_crypt_key.key git_crypt_key.key64

      - name: Install packages from renv.lock (local, no cache)
        run: |
          renv::restore()
        shell: Rscript {0}

      - name: Copy files to docs folder
        run: |
          mkdir -p docs
          cp -r reports/text-extraction-handwriting.html docs/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
